<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive | Discovery Master V7</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* บังคับสไตล์พื้นฐาน กันพัง */
        :root { --bg: #ffffff; --text: #1a1c20; --gold: #c5a35d; --danger: #ff4d4d; }
        * { box-sizing: border-box; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }

        header { padding: 60px 20px; text-align: center; position: relative; }
        header h1 { font-weight: 200; font-size: 2.5rem; letter-spacing: 10px; margin: 0; text-transform: uppercase; }
        
        /* ปุ่ม Management */
        .admin-trigger { position: absolute; top: 20px; right: 20px; font-size: 10px; padding: 8px 20px; border: 1px solid var(--text); border-radius: 50px; cursor: pointer; background: #fff; z-index: 999; }

        /* Search & Filter */
        .filter-section { max-width: 600px; margin: 0 auto 40px; text-align: center; padding: 0 20px; }
        .search-box { width: 100%; padding: 12px 25px; border-radius: 50px; border: 1px solid #eee; outline: none; font-family: 'Prompt'; }

        /* Shelf UI */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center; }
        .shelf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 40px 20px; min-height: 200px; }
        
        .book-item { display: flex; flex-direction: column; align-items: center; }
        .book-wrapper { width: 160px; height: 230px; cursor: pointer; perspective: 1000px; margin-bottom: 15px; }
        .book-cover { width: 100%; height: 100%; border-radius: 4px 10px 10px 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); overflow: hidden; transition: 0.5s; border-left: 1px solid rgba(0,0,0,0.05); }
        .book-cover img { width: 100%; height: 100%; object-fit: cover; }
        .book-wrapper:hover .book-cover { transform: rotateY(-20deg) scale(1.05); }
        .book-title { font-size: 0.85rem; color: #333; max-width: 160px; }

        /* Admin UI - บังคับซ่อนถ้าไม่ Login */
        #adminPanel { display: none; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto 30px; padding: 30px; border: 1px solid #eee; border-radius: 20px; background: #fafafa; }
        #adminPanel input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Prompt'; }
        
        .btn-sync { background: #1a1c20; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-logout { background: none; border: 1px solid #ccc; color: #999; padding: 5px 20px; border-radius: 50px; cursor: pointer; font-size: 10px; margin-top: 15px; }
        
        #saveOrderBtn { display: none; background: var(--gold); color: #fff; border: none; padding: 10px 30px; border-radius: 50px; cursor: pointer; margin: 0 auto 30px; font-weight: 600; }

        /* Overlay */
        #loginOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        #readerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10001; flex-direction: column; }
        
        iframe { border: none; flex-grow: 1; }
        .offline-msg { color: #ccc; padding: 50px; font-size: 14px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="admin-trigger" onclick="showLogin()">Management</div>
<header><h1>ชั้นหนังสือ ส.ธ.ย.</h1></header>

<div class="filter-section">
    <input type="text" id="searchInput" class="search-box" placeholder="Search title..." oninput="filterBooks()">
</div>

<div id="loginOverlay">
    <h2 style="font-weight:200; letter-spacing:4px;">PRIVATE ACCESS</h2>
    <input type="password" id="passInput" placeholder="Password" style="border:none; border-bottom:2px solid #eee; padding:15px; width:200px; text-align:center; font-size:20px; outline:none; font-family:'Prompt';">
    <button onclick="checkLogin()" id="unlockBtn" style="margin-top:30px; background:#1a1c20; color:#fff; border:none; padding:12px 40px; border-radius:50px; cursor:pointer;">UNLOCK</button>
    <p onclick="hideLogin()" style="cursor:pointer; font-size:10px; color:#aaa; margin-top:20px;">BACK TO LIBRARY</p>
</div>

<div class="container">
    <div id="adminPanel">
        <h3 id="panelTitle">NEW ENTRY</h3>
        <input type="text" id="tIn" placeholder="Title">
        <input type="text" id="pIn" placeholder="Drive Link">
        <input type="text" id="cIn" placeholder="Category">
        <input type="file" id="fIn" accept="image/*">
        <button onclick="saveEntry()" id="saveBtn" class="btn-sync">SYNC TO CLOUD</button>
        <button class="btn-logout" onclick="safeLogout()">LOGOUT</button>
    </div>

    <button id="saveOrderBtn" onclick="saveNewOrder()">✓ SAVE NEW ORDER</button>
    <div id="bookshelf" class="shelf-grid">
        <div class="offline-msg">LOADING DATABASE...</div>
    </div>
</div>

<div id="readerModal">
    <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
        <span id="readingTitle" style="color:var(--gold); font-size:0.8rem; font-weight:600;"></span>
        <button onclick="closeReader()" style="background:#1a1c20; color:white; border:none; padding:8px 25px; border-radius:50px; cursor:pointer; font-size:11px;">CLOSE</button>
    </div>
    <iframe id="pdfFrame" src=""></iframe>
</div>

<script>
    // *** เปลี่ยนเป็น URL /exec ของคุณ ***
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzKn6wGtt_9gO6lDMPMY7r1Wqqs-H10ML0JaQX1FDXVVwBvo7B1_Ba8RYJzF0q-N_yf/exec'; 

    let books = [], isAdmin = false, currentPassword = "", editIndex = null, sortable = null;

    async function loadData() {
        const shelf = document.getElementById('bookshelf');
        try {
            const res = await fetch(scriptURL);
            if(!res.ok) throw new Error();
            books = await res.json();
            render();
        } catch(e) {
            shelf.innerHTML = '<div class="offline-msg">OFFLINE: CHECK SCRIPT DEPLOYMENT</div>';
        }
    }

    function render(data = books) {
        const shelf = document.getElementById('bookshelf');
        shelf.innerHTML = '';
        data.forEach((b, i) => {
            const realIdx = books.findIndex(x => x[0] === b[0]);
            const item = document.createElement('div');
            item.className = 'book-item';
            item.innerHTML = `
                <div class="book-wrapper" onclick="${isAdmin ? '' : `openReader('${b[1]}', '${b[0]}')`}">
                    <div class="book-cover"><img src="${b[2]}" onerror="this.src='https://via.placeholder.com/160x230?text=No+Image'"></div>
                </div>
                <div class="book-title">${b[0]}</div>
                ${isAdmin ? `<div style="margin-top:10px;"><button onclick="editBook(${realIdx})" style="font-size:10px; color:orange; border:none; background:none; cursor:pointer;">EDIT</button> | <button onclick="deleteBook(${realIdx})" style="font-size:10px; color:red; border:none; background:none; cursor:pointer;">DEL</button></div>` : ''}
            `;
            shelf.appendChild(item);
        });
        if (isAdmin) {
            if(sortable) sortable.destroy();
            sortable = new Sortable(shelf, { animation: 200 });
        }
    }

    function filterBooks() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = books.filter(b => b[0].toLowerCase().includes(term));
        render(filtered);
    }

    // ระบบ Login
    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
    
    async function checkLogin() {
        const pass = document.getElementById('passInput').value;
        const btn = document.getElementById('unlockBtn');
        btn.innerText = "VERIFYING...";
        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'check', password: pass }) });
            const result = await res.json();
            if (result.status === "Success") {
                isAdmin = true; currentPassword = pass;
                hideLogin();
                document.getElementById('adminPanel').style.display = 'flex';
                document.getElementById('saveOrderBtn').style.display = 'block';
                render();
            } else { alert("Wrong Password"); btn.innerText = "UNLOCK"; }
        } catch(e) { alert("CORS Error: Check Script Access"); btn.innerText = "UNLOCK"; }
    }

    function safeLogout() {
        isAdmin = false; currentPassword = "";
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('saveOrderBtn').style.display = 'none';
        render();
    }

    // ระบบ Save & Delete แบบชัวร์ๆ
    async function saveEntry() {
        const btn = document.getElementById('saveBtn'); btn.innerText = "SAVING...";
        const payload = {
            action: editIndex !== null ? 'edit' : 'add',
            title: document.getElementById('tIn').value,
            pdfUrl: document.getElementById('pIn').value,
            category: document.getElementById('cIn').value,
            password: currentPassword,
            index: editIndex,
            coverData: books[editIndex] ? books[editIndex][2] : ''
        };
        // ถ้ามีการเลือกไฟล์ใหม่ (ระบบย่อรูปต้องใส่เพิ่มถ้าต้องการ แต่ตอนนี้เอาแบบพื้นฐานก่อนเพื่อความชัวร์)
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        setTimeout(() => { location.reload(); }, 2000);
    }

    async function deleteBook(i) {
        if(!confirm("Delete?")) return;
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:'delete', index:i, password:currentPassword}) });
        setTimeout(() => { location.reload(); }, 2000);
    }

    function openReader(url, title) {
        document.getElementById('pdfFrame').src = url;
        document.getElementById('readingTitle').innerText = title;
        document.getElementById('readerModal').style.display = 'flex';
    }
    function closeReader() { document.getElementById('readerModal').style.display = 'none'; }

    loadData();
</script>
</body>
</html>
